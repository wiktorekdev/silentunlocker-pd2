name: Validate

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1

      - name: Compile Lua files
        run: find SilentDLCUnlocker -name '*.lua' -print0 | xargs -0 -n1 luac5.1 -p

      - name: Test verifier parity
        run: lua5.1 tests/verifier_spec.lua

      - name: Validate release metadata
        run: python scripts/validate_release.py
